spring:
  application:
    name: spaced-repetition-data
  # Database configuration is handled via environment variables and HikariCP
  # See DatabaseConfig.java for details
  # datasource:
  #   url: jdbc:postgresql://${DATA_SERVICE_DB_HOST:localhost}:${DATA_SERVICE_DB_PORT:5432}/${DATA_SERVICE_DB_NAME:spaced-repetition-bot-db}
  #   username: ${DATA_SERVICE_DB_USER:postgres}
  #   password: ${DATA_SERVICE_DB_PASSWORD:postgres}
  #   driver-class-name: org.postgresql.Driver
  #   hikari:
  #     maximum-pool-size: ${DATA_SERVICE_DB_MAX_POOL_SIZE:10}
  #     connection-timeout: 30000
  #     idle-timeout: 600000
  #     max-lifetime: 1800000

server:
  port: 8081

# Health endpoints (plain Java HTTP server, not Spring Boot):
# - Readiness: http://localhost:8081/health/ready
# - Liveness: http://localhost:8081/health/live  
# - Metrics: http://localhost:8081/metrics
#
# gRPC health protocol (via grpcurl):
# - Check: grpcurl -plaintext localhost:9091 grpc.health.v1.Health/Check
# - Watch: grpcurl -plaintext localhost:9091 grpc.health.v1.Health/Watch