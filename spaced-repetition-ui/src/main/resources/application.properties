# Spaced Repetition UI Configuration
# This file contains configuration properties for the UI application

# Application settings
app.name=Spaced Repetition UI
app.version=0.0.1-SNAPSHOT
app.description=Java Swing desktop application for spaced repetition learning

# Database configuration (to be used with PostgreSQL JDBC)
db.host=localhost
db.port=5432
db.name=spaced_repetition
db.username=postgres
db.password=postgres

# gRPC service configuration
grpc.host=localhost
grpc.port=9090
# Data service URL for statistics (9090 for production, 9091 for development)
data.service.url=localhost:9091

# UI settings
ui.window.title=Spaced Repetition Enhanced
ui.window.width=1024
ui.window.height=768
ui.window.resizable=true

# Logging configuration
logging.level.root=INFO
logging.level.org.company.spacedrepetitionui=DEBUG