services:

  spaced-repetition-bot-db:
    container_name: spaced-repetition-bot-db
    image: postgres:17.5-alpine
    ports:
      - '5430:5432'
    environment:
      POSTGRES_USER: ${TELEGRAM_BOT_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TELEGRAM_BOT_DB_PASSWORD:-postgres}
      POSTGRES_DB: spaced-repetition-bot-db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: 10m
        max-file: 3
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spaced-repetition-bot-db"]
      interval: 30s
      timeout: 10s
      retries: 5

  spaced-repetition-bot:
    image: ouidockeruser/spaced-repetition-bot-enhanced:latest
    container_name: spaced-repetition-bot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    ports:
      - "9100:8080"
    environment:
      _JAVA_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/tmp/heapdump.hprof
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseG1GC
        -Xlog:gc*,heap*:file=/tmp/gc.log:time,level:filecount=3,filesize=10m
      TELEGRAM_BOT_DB_HOST: spaced-repetition-bot-db
      TELEGRAM_BOT_DB_PORT: 5432
      TELEGRAM_BOT_DB_USER: ${TELEGRAM_BOT_DB_USER:-postgres}
      TELEGRAM_BOT_DB_PASSWORD: ${TELEGRAM_BOT_DB_PASSWORD:-postgres}
      TELEGRAM_BOT_PORT: ${TELEGRAM_BOT_PORT:-8080}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME:-SpacedRepetitionBot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-dummy}
      DEFAULT_DECK_REPO_URL: ${DEFAULT_DECK_REPO_URL:-https://github.com/example/example.git}
      GIT_SSH_PASSPHRASE: ${GIT_SSH_PASSPHRASE:-dummy}
      GIT_WEBHOOK_SECRET: ${GIT_WEBHOOK_SECRET:-dummy}
      GIT_TOKEN: ${GIT_TOKEN:-dummy}
      ENCRYPTION_PASSWORD: ${ENCRYPTION_PASSWORD:-dummy}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:-dummy}
      DATA_SERVICE_URL: static://spaced-repetition-data:9090
      ANALYTICS_OUTBOX_PROCESSOR_BATCH_SIZE: ${ANALYTICS_OUTBOX_PROCESSOR_BATCH_SIZE:-50}
      ANALYTICS_OUTBOX_PROCESSOR_CRON: ${ANALYTICS_OUTBOX_PROCESSOR_CRON:-*/30 * * * * *}
    logging:
      driver: "json-file"
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      spaced-repetition-bot-db:
        condition: service_healthy

  spaced-repetition-data:
    image: ouidockeruser/spaced-repetition-data-enhanced:latest
    container_name: spaced-repetition-data
    restart: unless-stopped
    environment:
      _JAVA_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/tmp/heapdump.hprof
        -XX:+ExitOnOutOfMemoryError
        -Xlog:gc*,heap*:file=/tmp/gc.log:time,level:filecount=3,filesize=10m
      DATA_SERVICE_PORT: 9090
      DATA_SERVICE_DB_HOST: spaced-repetition-bot-db
      DATA_SERVICE_DB_PORT: 5432
      DATA_SERVICE_DB_NAME: spaced-repetition-bot-db
      DATA_SERVICE_DB_USER: ${TELEGRAM_BOT_DB_USER:-postgres}
      DATA_SERVICE_DB_PASSWORD: ${TELEGRAM_BOT_DB_PASSWORD:-postgres}
      DATA_SERVICE_DB_MAX_POOL_SIZE: 10
      DATA_SERVICE_DB_SCHEMA: public
      SPRING_APPLICATION_NAME: spaced-repetition-data
      SERVER_PORT: 8081
      LOGGING_LEVEL_ROOT: INFO
    ports:
      - "9090:9090"  # gRPC port for production
    logging:
      driver: "json-file"
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      spaced-repetition-bot-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data: